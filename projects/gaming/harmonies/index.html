<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmonies v4.0 - Phaser Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #2c3e50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    #game-container {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
      max-height: 90vh;
    }

    .info {
      background: #ecf0f1;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      max-width: 1200px;
      width: 100%;
    }

    .info h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: #2c3e50;
    }

    .info p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }

    .success {
      color: #27ae60;
      font-weight: bold;
    }

    .status {
      background: #27ae60;
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Main game entry point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
