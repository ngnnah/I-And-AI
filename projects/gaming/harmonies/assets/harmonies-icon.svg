<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Harmonies">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde7da"/>
      <stop offset=".55" stop-color="#f6d9e2"/>
      <stop offset="1" stop-color="#dbeaef"/>
    </linearGradient>
    <linearGradient id="hFuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93aeca"/>
      <stop offset="1" stop-color="#566f9d"/>
    </linearGradient>
    <linearGradient id="hWave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d92ba"/>
      <stop offset="1" stop-color="#1e4f7c"/>
    </linearGradient>
    <clipPath id="hRound"><rect width="64" height="64" rx="15"/></clipPath>
  </defs>
  <g clip-path="url(#hRound)">
    <rect width="64" height="64" fill="url(#hSky)"/>

    <!-- sun (right) -->
    <circle cx="48" cy="18" r="8.5" fill="#f4a082"/>

    <!-- sakura blossom (left) -->
    <g transform="translate(14,16)" fill="#f6a6c2">
      <circle cx="0" cy="-3.4" r="2.6"/>
      <circle cx="3.23" cy="-1.05" r="2.6"/>
      <circle cx="2" cy="2.75" r="2.6"/>
      <circle cx="-2" cy="2.75" r="2.6"/>
      <circle cx="-3.23" cy="-1.05" r="2.6"/>
      <circle cx="0" cy="0" r="1.35" fill="#fce6ad"/>
    </g>

    <!-- Mt Fuji + snow cap -->
    <path d="M8 44 Q30 14 32 12 Q34 14 56 44 Z" fill="url(#hFuji)"/>
    <path d="M20 27 Q30 15 32 12 Q34 15 44 27 Q40 24 36 27 Q33 21 32 27 Q31 21 28 27 Q24 24 20 27 Z" fill="#f8fcff"/>

    <!-- full-width Hokusai wave across the foreground -->
    <path d="M0 45 Q7 33 17 38 Q26 43 30 40 Q34 37 41 41 Q49 45 56 41 Q60 39 64 42 L64 64 L0 64 Z" fill="url(#hWave)"/>
    <!-- foam claws following the crest, left → right -->
    <g fill="#eef8ff">
      <circle cx="5" cy="40" r="1.7"/>
      <circle cx="9" cy="35.5" r="2.1"/>
      <circle cx="13" cy="34.5" r="1.7"/>
      <circle cx="17" cy="37" r="1.3"/>
      <circle cx="23" cy="41.5" r="1.4"/>
      <circle cx="30" cy="40" r="1.2"/>
      <circle cx="37" cy="39.5" r="1.3"/>
      <circle cx="45" cy="43" r="1.3"/>
      <circle cx="53" cy="42" r="1.1"/>
    </g>
    <!-- a second gentle foam line for depth -->
    <path d="M0 46 Q7 35 17 39 Q26 44 30 41 Q34 38 41 42 Q49 46 56 42 Q60 40 64 43"
          fill="none" stroke="#cfe8f6" stroke-width="1.1" opacity=".6"/>
  </g>
</svg>
