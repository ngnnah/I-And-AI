<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Harmonies">
  <defs>
    <linearGradient id="fSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe2d6"/>
      <stop offset="1" stop-color="#e2edf1"/>
    </linearGradient>
    <linearGradient id="fFuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fabc7"/>
      <stop offset="1" stop-color="#4f6e9c"/>
    </linearGradient>
    <clipPath id="fRound"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#fRound)">
    <rect width="64" height="64" fill="url(#fSky)"/>
    <!-- sun -->
    <circle cx="45" cy="20" r="9" fill="#f4a082"/>
    <!-- bold Mt Fuji -->
    <path d="M4 50 L30 12 Q32 9 34 12 L60 50 Z" fill="url(#fFuji)"/>
    <!-- snow cap -->
    <path d="M18 30 L30 12 Q32 9 34 12 L46 30 Q40 25 35 30 Q32 22 29 30 Q24 25 18 30 Z" fill="#fbfdff"/>
    <!-- water band -->
    <path d="M0 50 Q16 44 32 50 Q48 56 64 50 L64 64 L0 64 Z" fill="#1f4f7c"/>
    <path d="M0 50 Q16 45 32 50 Q48 55 64 50" fill="none" stroke="#bfe0f2" stroke-width="2" opacity=".7"/>
  </g>
</svg>
