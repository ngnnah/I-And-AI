<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Harmonies">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdeadd"/>
      <stop offset=".5" stop-color="#f7dbe4"/>
      <stop offset="1" stop-color="#dcebf0"/>
    </linearGradient>
    <linearGradient id="hFuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93aeca"/>
      <stop offset="1" stop-color="#5a76a3"/>
    </linearGradient>
    <linearGradient id="hWave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a8fb8"/>
      <stop offset="1" stop-color="#1e4f7c"/>
    </linearGradient>
    <clipPath id="hRound"><rect width="64" height="64" rx="15"/></clipPath>
  </defs>
  <g clip-path="url(#hRound)">
    <rect width="64" height="64" fill="url(#hSky)"/>

    <!-- rising sun -->
    <circle cx="35" cy="17" r="9" fill="#f4a488" opacity=".85"/>

    <!-- Mt Fuji -->
    <path d="M4 47 Q24 18 27 16 Q30 18 50 47 Z" fill="url(#hFuji)"/>
    <path d="M18 28 Q24 19 27 16 Q30 19 36 28 Q33 25.5 30.5 28 Q28 23 27 28 Q25.5 24.5 23.5 28 Q21 25.5 18 28 Z" fill="#f8fcff"/>

    <!-- BIG temple (pagoda) at the foot, right side (ink silhouette) -->
    <g fill="#333a45">
      <!-- finial -->
      <rect x="45.4" y="20" width="1.4" height="4"/>
      <circle cx="46.1" cy="19.5" r="1.4"/>
      <!-- three upturned roofs, widening downward -->
      <path d="M39 30 Q46 23 53 30 Q49 28 46 28 Q43 28 39 30 Z"/>
      <path d="M36.5 37 Q46 29 55.5 37 Q50 34.5 46 34.5 Q42 34.5 36.5 37 Z"/>
      <path d="M34 45 Q46 35.5 58 45 Q51 42 46 42 Q41 42 34 45 Z"/>
      <!-- body columns between roofs -->
      <rect x="44" y="30" width="4" height="4"/>
      <rect x="42.5" y="45" width="7" height="4" rx="0.6"/>
    </g>

    <!-- BIG Hokusai wave: hooking crest on the left with foam claws -->
    <path d="M0 47 Q14 42 26 47 Q40 52 52 47 L64 47 L64 64 L0 64 Z" fill="url(#hWave)"/>
    <path d="M2 48 Q0 30 15 27 Q29 25 30 41 Q27 30 15 32 Q6 34 8 48 Z" fill="url(#hWave)"/>
    <!-- foam claws along the curling crest -->
    <g fill="#eef8ff">
      <circle cx="28" cy="35" r="2.4"/>
      <circle cx="23.5" cy="30.5" r="1.9"/>
      <circle cx="18.5" cy="28.5" r="1.5"/>
      <circle cx="13.5" cy="28.5" r="1.2"/>
      <circle cx="9.5" cy="30.5" r="1"/>
      <circle cx="8.5" cy="43" r="1.5"/>
      <circle cx="12" cy="45" r="1.1"/>
    </g>

    <!-- sakura blossom in the sky (distinct, top-left) -->
    <g transform="translate(12,12)" fill="#f6a6c2">
      <circle cx="0" cy="-3.4" r="2.6"/>
      <circle cx="3.23" cy="-1.05" r="2.6"/>
      <circle cx="2" cy="2.75" r="2.6"/>
      <circle cx="-2" cy="2.75" r="2.6"/>
      <circle cx="-3.23" cy="-1.05" r="2.6"/>
      <circle cx="0" cy="0" r="1.35" fill="#fce6ad"/>
    </g>
  </g>
</svg>
