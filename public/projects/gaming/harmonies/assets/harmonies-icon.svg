<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Harmonies">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdeadd"/>
      <stop offset=".5" stop-color="#f7dbe4"/>
      <stop offset="1" stop-color="#dcebf0"/>
    </linearGradient>
    <linearGradient id="hFuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fabc7"/>
      <stop offset="1" stop-color="#5773a0"/>
    </linearGradient>
    <linearGradient id="hWave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a8fb8"/>
      <stop offset="1" stop-color="#1e4f7c"/>
    </linearGradient>
    <clipPath id="hRound"><rect width="64" height="64" rx="15"/></clipPath>
  </defs>
  <g clip-path="url(#hRound)">
    <rect width="64" height="64" fill="url(#hSky)"/>
    <!-- rising sun -->
    <circle cx="43" cy="23" r="11" fill="#f4a488" opacity=".85"/>
    <!-- Mt Fuji (gentle Hokusai slopes) -->
    <path d="M7 46 Q28 17 31 15 Q34 17 55 46 Z" fill="url(#hFuji)"/>
    <!-- snow cap -->
    <path d="M22 27 Q28 18 31 15 Q34 18 40 27 Q37 24 34.5 27 Q32 22 31 27 Q29.5 23 27.5 27 Q25 24 22 27 Z" fill="#f8fcff"/>
    <!-- temple roof silhouette at the foot (ink) -->
    <g fill="#333a45">
      <path d="M33 45 Q40 37 47 45 Q43 43.5 40 43.5 Q37 43.5 33 45 Z"/>
      <rect x="39" y="45" width="2" height="3.2"/>
      <rect x="39.4" y="33.6" width="1.2" height="3"/>
    </g>
    <!-- Hokusai wave (foreground) -->
    <path d="M0 47 Q8 40 16 46 Q24 52 32 46 Q40 40 48 46 Q56 52 64 46 L64 64 L0 64 Z" fill="url(#hWave)"/>
    <!-- foam -->
    <path d="M2 46 Q9 39 17 45 Q12 43 8 45 Q13 41 18 44" fill="none" stroke="#eef8ff" stroke-width="1.5" stroke-linecap="round" opacity=".92"/>
    <circle cx="11" cy="45" r="1.2" fill="#eef8ff"/>
    <circle cx="15.5" cy="46.6" r=".9" fill="#eef8ff"/>
    <!-- sakura blossom (top-left) -->
    <g transform="translate(13,13)" fill="#f6a6c2">
      <circle cx="0" cy="-3.1" r="2.4"/>
      <circle cx="2.95" cy="-0.96" r="2.4"/>
      <circle cx="1.82" cy="2.5" r="2.4"/>
      <circle cx="-1.82" cy="2.5" r="2.4"/>
      <circle cx="-2.95" cy="-0.96" r="2.4"/>
      <circle cx="0" cy="0" r="1.25" fill="#fce6ad"/>
    </g>
  </g>
</svg>
