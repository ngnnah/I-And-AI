<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmonies Debug</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: #fff;
      font-family: monospace;
      display: flex;
    }
    #game-container {
      flex: 1;
    }
    #debug-panel {
      width: 400px;
      background: #2a2a2a;
      padding: 20px;
      overflow-y: auto;
      max-height: 100vh;
    }
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #4CAF50;
      font-size: 11px;
    }
    .log-error {
      border-left-color: #f44336;
    }
    .log-warn {
      border-left-color: #ff9800;
    }
    h2 {
      margin-top: 20px;
      color: #4CAF50;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      background: #333;
      border-radius: 4px;
    }
    .status.good { border-left: 4px solid #4CAF50; }
    .status.bad { border-left: 4px solid #f44336; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="debug-panel">
    <h1>🐛 Debug Panel</h1>
    <div id="status"></div>
    <h2>Console Logs</h2>
    <div id="logs"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    // Intercept console logs
    const logContainer = document.getElementById('logs');
    const statusContainer = document.getElementById('status');
    
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    function addLog(message, type = 'log') {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      addLog(args.join(' '), 'log');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      addLog(args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalWarn.apply(console, args);
      addLog(args.join(' '), 'warn');
    };
    
    // Status updates
    function updateStatus(key, value, isGood = true) {
      const status = document.createElement('div');
      status.className = `status ${isGood ? 'good' : 'bad'}`;
      status.innerHTML = `<strong>${key}:</strong> ${value}`;
      statusContainer.appendChild(status);
    }
    
    // Wait for Phaser to load, then import game
    window.addEventListener('load', () => {
      updateStatus('Phaser', 'Loaded v' + Phaser.VERSION, true);
      
      // Import main game
      import('./js/main.js').then(() => {
        updateStatus('Game Module', 'Imported successfully', true);
        
        // Monitor game events after a delay
        setTimeout(() => {
          if (window.game) {
            updateStatus('Phaser Game', 'Instance created', true);
            
            const scene = window.game.scene.getScene('GameScene');
            if (scene) {
              updateStatus('GameScene', 'Found and active', true);
              
              // Check UI elements
              setTimeout(() => {
                if (scene.instructionText) {
                  updateStatus('instructionText', 'Defined ✓', true);
                } else {
                  updateStatus('instructionText', 'UNDEFINED!', false);
                }
                
                if (scene.tokenCounterText) {
                  updateStatus('tokenCounterText', 'Defined ✓', true);
                } else {
                  updateStatus('tokenCounterText', 'UNDEFINED!', false);
                }
                
                if (scene.endTurnButton) {
                  updateStatus('endTurnButton', 'Defined ✓', true);
                } else {
                  updateStatus('endTurnButton', 'UNDEFINED!', false);
                }
                
                if (scene.centralBoard) {
                  updateStatus('centralBoard', 'Created ✓', true);
                } else {
                  updateStatus('centralBoard', 'NOT CREATED!', false);
                }
              }, 2000);
            } else {
              updateStatus('GameScene', 'NOT FOUND!', false);
            }
          } else {
            updateStatus('Phaser Game', 'Instance not created!', false);
          }
        }, 3000);
      }).catch(err => {
        updateStatus('Game Module', 'Import failed: ' + err.message, false);
      });
    });
  </script>
</body>
</html>
